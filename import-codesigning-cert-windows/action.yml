---
name: 'Import Code-Signing Certificate Windows'
description: 'Import PFX certificate from base64-encoded secrets into Windows certificate store'
inputs:
  pfx_base64:
    description: 'Base64-encoded PFX certificate data'
    required: true
  pfx_password:
    description: 'Password for the PFX certificate'
    required: true
outputs:
  certificate_thumbprint:
    description: 'Thumbprint of the imported certificate'
    value: ${{ steps.import.outputs.thumbprint }}
runs:
  using: 'composite'
  steps:
    - id: import
      shell: pwsh
      env:
        CODESIGN_PFX_BASE64: ${{ inputs.pfx_base64 }}
        CODESIGN_PFX_PASSWORD: ${{ inputs.pfx_password }}
      run: |
        $output = & "${{ github.action_path }}/Import-CodeSigningCert.ps1"
        $thumbprint = $output `
          | Where-Object { $_ -match "Certificate thumbprint: (.+)" } `
          | ForEach-Object { $_.Split(': ')[1] }
        if ($thumbprint) {
          Write-Output "thumbprint=$thumbprint" >> $env:GITHUB_OUTPUT
        }
