name: Test Actions

on:
  push:
    branches: [ main, 'building-v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-import-cert-action:
    name: Test Import Certificate Action
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create test certificate
        shell: pwsh
        run: |
          & "${{ github.workspace }}\.github\scripts\Create-TestCertificateForImport.ps1"

      - name: Test Import Certificate Action
        id: import-test
        uses: ./import-codesigning-cert-windows
        with:
          pfx_base64: ${{ env.TEST_PFX_BASE64 }}
          pfx_password: ${{ env.TEST_PFX_PASSWORD }}

      - name: Verify certificate import
        shell: pwsh
        run: |
          & "${{ github.workspace }}\.github\scripts\Verify-CertificateImportAction.ps1" -CertificateThumbprint "${{ steps.import-test.outputs.certificate_thumbprint }}"

  test-codesign-action:
    name: Test Code Sign Action
    runs-on: windows-latest
    needs: test-import-cert-action
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create test PowerShell files
        shell: pwsh
        run: |
          & "${{ github.workspace }}\.github\scripts\Create-TestPowerShellFilesForSigning.ps1" -TestPath "test-scripts"

      - name: Create test certificate and import
        shell: pwsh
        run: |
          & "${{ github.workspace }}\.github\scripts\Create-TestCertificateForCodeSigning.ps1"

      - name: Test Code Sign Action (Test Mode)
        uses: ./codesign-files-windows
        with:
          path: test-scripts
          test_only: true
          recurse: true

      - name: Test Code Sign Action (Signing)
        uses: ./codesign-files-windows
        with:
          path: test-scripts
          recurse: true
          cleanup_certificate: true

      - name: Verify signatures
        shell: pwsh
        run: |
          & "${{ github.workspace }}\.github\scripts\Verify-CodeSigningResults.ps1" -TestPath "test-scripts" -TestCertThumbprint "${{ env.TEST_CERT_THUMBPRINT }}"

  test-deploy-action:
    name: Test Deploy Action
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create test source structure
        shell: pwsh
        run: |
          & "${{ github.workspace }}\.github\scripts\Create-TestSourceStructure.ps1" -SourcePath "test-source"

      - name: Test Deploy Action (Test Mode)
        uses: ./deploy-files-windows
        with:
          source_path: test-source  
          destination_path: C:\temp\deploy-test
          test_only: true

      - name: Test Deploy Action (Actual Deploy)
        uses: ./deploy-files-windows
        with:
          source_path: test-source
          destination_path: C:\temp\deploy-test

      - name: Verify deployment
        shell: pwsh
        run: |
          & "${{ github.workspace }}\.github\scripts\Verify-TestDeployment.ps1" -DestinationPath "C:\temp\deploy-test" -SourcePath "test-source"